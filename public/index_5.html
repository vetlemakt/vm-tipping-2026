<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="VM-tipping 2026 – FIFA World Cup" />
    <title>VM-tipping 2026 ⚽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: linear-gradient(135deg, #0a0e1a 0%, #0d1230 50%, #0a0e1a 100%);
        background-attachment: fixed;
        font-family: 'Kanit', sans-serif;
        color: #e8edf8;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,215,0,.4); border-radius: 2px; }
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none} }
      @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
      @keyframes spin { to{transform:rotate(360deg)} }
      @keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(255,215,0,.3)}50%{box-shadow:0 0 20px rgba(255,215,0,.6)} }
      .fu { animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: rgba(255,215,0,.5) !important;
        box-shadow: 0 0 0 2px rgba(255,215,0,.1) !important;
      }
      button:active { transform: scale(.97); }
      option { background: #161b2c; color: #e8edf8; }
    </style>
  </head>
  <body>
    <noscript>Aktiver JavaScript for å bruke VM-tipping 2026.</noscript>
    <div id="root"></div>
  </body>
</html>
