<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07070f" />
    <meta name="description" content="VM-tipping 2026 – FIFA World Cup" />
    <title>VM-tipping 2026 ⚽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: #07070f; font-family: 'Plus Jakarta Sans', sans-serif; color: #e2e2f0; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #07070f; }
      ::-webkit-scrollbar-thumb { background: #39ff7e; border-radius: 2px; }
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none} }
      @keyframes fadeIn { from{opacity:0}to{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
      @keyframes spin { to{transform:rotate(360deg)} }
      @keyframes slideRight { from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none} }
      @keyframes liveDot { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)} }
      .fu { animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
      .fi { animation: fadeIn .3s ease both; }
      .sr { animation: slideRight .35s cubic-bezier(.22,1,.36,1) both; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      input:focus, select:focus, textarea:focus { outline: none; border-color: #39ff7e !important; box-shadow: 0 0 0 2px rgba(57,255,126,.12) !important; }
      button:active { transform: scale(.97); }
      .live-dot { animation: liveDot 1.5s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <noscript>Aktiver JavaScript for å bruke VM-tipping 2026.</noscript>
    <div id="root"></div>
  </body>
</html>
