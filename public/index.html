<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080810" />
    <meta name="description" content="VM-tipping 2026 – FIFA World Cup" />
    <title>VM-tipping 2026 ⚽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Outfit:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { background: #080810; font-family: 'Outfit', sans-serif; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #080810; }
      ::-webkit-scrollbar-thumb { background: #b4ff00; border-radius: 2px; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes spin { to { transform:rotate(360deg); } }
      @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
      @keyframes neonPulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(180,255,0,.6))} 50%{filter:drop-shadow(0 0 20px rgba(180,255,0,1))} }
      @keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
      .fu { animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      input[type=number]:focus { border-color: #b4ff00 !important; box-shadow: 0 0 0 2px rgba(180,255,0,.1) !important; }
      button:active { transform: scale(.97); }
      select:focus { outline: none; border-color: #b4ff00 !important; }
    </style>
  </head>
  <body>
    <noscript>Du må aktivere JavaScript for å bruke VM-tipping 2026.</noscript>
    <div id="root"></div>
  </body>
</html>
